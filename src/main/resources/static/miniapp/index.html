<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЛГА АГРО</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./app.css">
</head>
<body>
    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <header class="topbar">
        <div class="brand">
            <div class="brand-mark">AA</div>
            <div class="brand-copy">
                <p class="brand-kicker">официальный каталог</p>
                <h1>АЛГА АГРО</h1>
            </div>
        </div>

        <nav class="topnav">
            <button class="nav-button active" id="catalogNavButton" type="button">Каталог</button>
            <button class="nav-button" id="cartNavButton" type="button">
                Корзина
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </nav>
    </header>

    <main class="shell">
        <section class="page page-active" id="catalogPage">
            <div class="toolbar">
                <div class="toolbar-search">
                    <label class="field field-inline">
                        <span>Поиск</span>
                        <input id="searchInput" type="search" placeholder="Семена, фунгициды, пшеница, кукуруза">
                    </label>
                </div>

                <div class="toolbar-controls">
                    <label class="field field-inline field-small">
                        <span>Сортировка</span>
                        <select id="sortSelect">
                            <option value="name">По названию</option>
                            <option value="price_asc">Сначала дешевле</option>
                            <option value="price_desc">Сначала дороже</option>
                            <option value="stock_desc">По наличию</option>
                        </select>
                    </label>
                    <button class="secondary-button" id="resetFilters" type="button">Сбросить</button>
                </div>
            </div>

            <section class="filters-panel">
                <div class="filter-group">
                    <p class="filter-title">Культуры</p>
                    <div class="chip-cloud" id="cultureChips"></div>
                </div>

                <div class="filter-group">
                    <p class="filter-title">Категории</p>
                    <div class="pill-list" id="categoryPills"></div>
                </div>

                <div class="filter-group">
                    <p class="filter-title">Назначение</p>
                    <div class="pill-list compact" id="tagPills"></div>
                </div>
            </section>

            <section class="catalog-panel">
                <div class="catalog-toolbar">
                    <div>
                        <p class="eyebrow">Каталог</p>
                        <h2 id="catalogTitle">Все товары</h2>
                    </div>
                    <p class="catalog-count" id="catalogCount">0 позиций</p>
                </div>

                <div class="product-grid" id="productGrid"></div>

                <div class="empty-state hidden" id="emptyState">
                    <h3>Каталог обновляется</h3>
                    <p>Скоро здесь появятся доступные товары.</p>
                </div>
            </section>
        </section>

        <section class="page" id="cartPage">
            <div class="page-card">
                <div class="page-head">
                    <div>
                        <p class="eyebrow">Корзина</p>
                        <h2>Ваш заказ</h2>
                    </div>
                    <p class="catalog-count" id="cartSummaryCount">0 товаров</p>
                </div>

                <div class="cart-items" id="cartItems"></div>

                <div class="cart-footer">
                    <div class="cart-summary">
                        <span>Итого</span>
                        <strong id="cartTotal">0 ₽</strong>
                    </div>
                    <button class="primary-button" id="checkoutButton" type="button">Оформить заказ</button>
                </div>
            </div>
        </section>

        <section class="page" id="checkoutPage">
            <div class="page-card page-card-wide">
                <div class="page-head">
                    <div>
                        <p class="eyebrow">Оформление</p>
                        <h2>Заявка администратору</h2>
                    </div>
                    <button class="secondary-button" id="backToCart" type="button">Назад</button>
                </div>

                <form id="checkoutForm" class="checkout-form">
                    <label class="field">
                        <span>Имя</span>
                        <input name="name" type="text" required placeholder="Как к вам обращаться">
                    </label>

                    <label class="field">
                        <span>Телефон</span>
                        <input name="phone" type="tel" required placeholder="+7 (___) ___-__-__">
                    </label>

                    <label class="field">
                        <span>Компания</span>
                        <input name="company" type="text" placeholder="ООО / ИП / хозяйство">
                    </label>

                    <label class="field field-full">
                        <span>Комментарий</span>
                        <textarea name="comment" rows="4" placeholder="Уточните объем, срочность или пожелания по заказу"></textarea>
                    </label>

                    <label class="field field-full">
                        <span>Дополнительно</span>
                        <textarea name="deliveryNote" rows="3" placeholder="Например: нужны рекомендации по культуре и актуальные остатки"></textarea>
                    </label>

                    <div class="checkout-actions">
                        <button class="secondary-button" id="backToCatalog" type="button">В каталог</button>
                        <button class="primary-button" type="submit">Отправить заказ</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <div class="toast hidden" id="toast"></div>

    <script src="./app.js" type="module"></script>
</body>
</html>
