server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: alga-agro-max
  datasource:
    url: jdbc:sqlite:${APP_DB_PATH:/data/alga-agro.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: false
  jackson:
    time-zone: Europe/Moscow
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  public-base-url: ${APP_PUBLIC_BASE_URL:https://algaagro.ru}
  mini-app-url: ${APP_MINI_APP_URL:https://algaagro.ru/miniapp/}
  manager-contact-url: ${APP_MANAGER_CONTACT_URL:https://max.ru/id27849376}
  manager-deep-link: ${APP_MANAGER_DEEP_LINK:max://user/27849376}
  storage-dir: ${APP_STORAGE_DIR:/data/storage}
  startup-admin-user-ids: ${APP_STARTUP_ADMIN_USER_IDS:}
  max:
    api-base-url: ${MAX_API_BASE_URL:https://platform-api2.max.ru}
    bot-token: ${MAX_BOT_TOKEN:}
    poll-timeout-seconds: ${MAX_POLL_TIMEOUT_SECONDS:30}
    poll-limit: ${MAX_POLL_LIMIT:100}
    post-target-chat-id: ${MAX_POST_TARGET_CHAT_ID:}
  ai:
    kie-base-url: ${KIE_BASE_URL:https://api.kie.ai}
    kie-api-key: ${KIE_API_KEY:}
    kie-model: ${KIE_MODEL:gpt-5-2}
    kie-timeout-seconds: ${KIE_TIMEOUT_SECONDS:300}
    kie-batch-size: ${KIE_BATCH_SIZE:500}
    kie-gemini-api-key: ${KIE_GEMINI_API_KEY:${KIE_API_KEY:}}
    kie-gemini-model: ${KIE_GEMINI_MODEL:gemini-3-flash}
    kie-gemini-endpoint: ${KIE_GEMINI_ENDPOINT:/gemini-3-flash/v1/chat/completions}
    gemini-timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:300}
  bitrix:
    webhook-base-url: ${BITRIX_WEBHOOK_BASE_URL:}
    sync-enabled: ${BITRIX_SYNC_ENABLED:true}
    catalog-id: ${BITRIX_CATALOG_ID:}
    base-price-type-id: ${BITRIX_BASE_PRICE_TYPE_ID:}
    currency-id: ${BITRIX_CURRENCY_ID:RUB}
    poll-interval-ms: ${BITRIX_POLL_INTERVAL_MS:180000}
    initial-sync-delay-ms: ${BITRIX_INITIAL_SYNC_DELAY_MS:45000}
    lead-title-prefix: ${BITRIX_LEAD_TITLE_PREFIX:Заказ из Alga Agro MAX}
    lead-assigned-by-id: ${BITRIX_LEAD_ASSIGNED_BY_ID:}
    lead-source-id: ${BITRIX_LEAD_SOURCE_ID:}
    originator-id: ${BITRIX_ORIGINATOR_ID:ALGA_AGRO_MAX}
